<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0050b3"/>
      <stop offset="100%" style="stop-color:#1890ff"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e6f7ff"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#40a9ff"/>
      <stop offset="100%" style="stop-color:#69c0ff"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bgGrad)"/>

  <!-- 数据库圆柱体 - 主体 -->
  <ellipse cx="48" cy="40" rx="26" ry="10" fill="url(#dbGrad)"/>
  <path d="M22 40 v36 c0 5.5 11.6 10 26 10 s26-4.5 26-10 v-36" fill="url(#dbGrad)"/>
  <ellipse cx="48" cy="76" rx="26" ry="10" fill="#ffffff"/>

  <!-- 数据库圆柱体顶部高光 -->
  <ellipse cx="48" cy="40" rx="20" ry="7" fill="none" stroke="#40a9ff" stroke-width="1.5" opacity="0.5"/>

  <!-- 数据库中间条纹 -->
  <path d="M24 55 c0 2.8 10.7 5 24 5 s24-2.2 24-5" fill="none" stroke="#bae7ff" stroke-width="2"/>

  <!-- 链接网络节点 - 右侧 -->
  <circle cx="85" cy="36" r="8" fill="url(#linkGrad)"/>
  <circle cx="100" cy="56" r="6" fill="url(#linkGrad)"/>
  <circle cx="85" cy="76" r="8" fill="url(#linkGrad)"/>
  <circle cx="100" cy="96" r="5" fill="url(#linkGrad)"/>

  <!-- 链接线 - 贝塞尔曲线连接数据库和节点 -->
  <path d="M74 48 c8-2 16 0 22-6" fill="none" stroke="#69c0ff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M74 56 c12 2 18 6 26 0" fill="none" stroke="#69c0ff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M74 64 c12 6 18 14 26 32" fill="none" stroke="#69c0ff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M74 72 c8 8 14 16 26 24" fill="none" stroke="#69c0ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- iDBLink 字母 i 的点 -->
  <circle cx="85" cy="56" r="4" fill="#ffffff"/>

  <!-- 装饰性光点 -->
  <circle cx="20" cy="20" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="108" cy="20" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="20" cy="108" r="2" fill="#ffffff" opacity="0.2"/>
</svg>